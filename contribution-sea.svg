<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <linearGradient id="seaLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#8bd3ff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>

    <linearGradient id="hullGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b86b2b"/>
      <stop offset="55%" stop-color="#7a3b12"/>
      <stop offset="100%" stop-color="#4a2108"/>
    </linearGradient>

    <linearGradient id="sailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="60%" stop-color="#f2dfaa"/>
      <stop offset="100%" stop-color="#d1ad6c"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shipShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="170" fill="url(#bgGrad)"/>

  <!-- Frame -->
  <rect x="24" y="16" width="852" height="134" rx="10" fill="none" stroke="#7d8590" stroke-width="1.2" opacity="0.75"/>
  <rect x="25" y="17" width="850" height="132" rx="10" fill="none" stroke="#c9d1d9" stroke-width="0.4" opacity="0.15"/>

  <!-- Stars -->
  <g opacity="0.45">
    <circle cx="92" cy="27" r="1.1" fill="#c9d1d9"/>
    <circle cx="178" cy="22" r="1" fill="#8b949e"/>
    <circle cx="276" cy="30" r="1.1" fill="#c9d1d9"/>
    <circle cx="410" cy="24" r="1" fill="#8b949e"/>
    <circle cx="552" cy="28" r="1.2" fill="#c9d1d9"/>
    <circle cx="705" cy="23" r="1" fill="#8b949e"/>
    <circle cx="806" cy="30" r="1.1" fill="#c9d1d9"/>
  </g>

  <!-- Contribution blocks -->
  <g transform="translate(96,48)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#0e4429"/>
    <rect x="18" y="0" width="14" height="14" rx="3" fill="#006d32"/>
    <rect x="36" y="0" width="14" height="14" rx="3" fill="#26a641"/>
    <rect x="54" y="0" width="14" height="14" rx="3" fill="#39d353"/>

    <rect x="0" y="18" width="14" height="14" rx="3" fill="#161b22"/>
    <rect x="18" y="18" width="14" height="14" rx="3" fill="#0e4429"/>
    <rect x="36" y="18" width="14" height="14" rx="3" fill="#006d32"/>
    <rect x="54" y="18" width="14" height="14" rx="3" fill="#26a641"/>
  </g>

  <!-- Wave -->
  <path
    d="M0 121 Q50 111 100 121 T200 121 T300 121 T400 121 T500 121 T600 121 T700 121 T800 121 T900 121"
    fill="none"
    stroke="url(#seaLine)"
    stroke-width="3"
    stroke-linecap="round"
    filter="url(#softGlow)">
    <animate
      attributeName="d"
      dur="5s"
      repeatCount="indefinite"
      values="
      M0 121 Q50 111 100 121 T200 121 T300 121 T400 121 T500 121 T600 121 T700 121 T800 121 T900 121;
      M0 121 Q50 131 100 121 T200 121 T300 121 T400 121 T500 121 T600 121 T700 121 T800 121 T900 121;
      M0 121 Q50 111 100 121 T200 121 T300 121 T400 121 T500 121 T600 121 T700 121 T800 121 T900 121"/>
  </path>

  <!-- Moving ship -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="-250 0"
      to="980 0"
      dur="14s"
      repeatCount="indefinite"/>

    <g transform="translate(180,18)" filter="url(#shipShadow)">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="180,18; 180,14; 180,18; 180,21; 180,18"
        dur="3s"
        repeatCount="indefinite"/>

      <!-- shadow -->
      <ellipse cx="96" cy="128" rx="90" ry="10" fill="#000" opacity="0.24"/>

      <!-- mast -->
      <rect x="93" y="10" width="8" height="102" rx="3" fill="#d8953f"/>
      <rect x="97" y="10" width="2" height="102" fill="#ffe6a7" opacity="0.45"/>
      <circle cx="97" cy="9" r="5" fill="#ffd166" stroke="#7a3b12" stroke-width="1.4"/>

      <!-- flag -->
      <path
        d="M101 17 C121 10 138 16 158 13 C146 21 147 26 165 32 C142 28 122 36 101 29 Z"
        fill="#e63946"
        stroke="#ffc857"
        stroke-width="1.5">
        <animate
          attributeName="d"
          dur="1.8s"
          repeatCount="indefinite"
          values="
          M101 17 C121 10 138 16 158 13 C146 21 147 26 165 32 C142 28 122 36 101 29 Z;
          M101 17 C125 8 142 18 164 14 C148 22 151 28 171 35 C144 29 123 38 101 29 Z;
          M101 17 C121 10 138 16 158 13 C146 21 147 26 165 32 C142 28 122 36 101 29 Z"/>
      </path>

      <!-- yard -->
      <path
        d="M26 50 C72 42 126 42 181 50"
        fill="none"
        stroke="#f0c674"
        stroke-width="8"
        stroke-linecap="round"/>
      <path
        d="M26 50 C72 42 126 42 181 50"
        fill="none"
        stroke="#5b2b0b"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.75"/>

      <!-- sail -->
      <path
        d="M38 53
           C60 60 137 60 171 53
           C184 86 176 113 152 124
           C122 133 72 129 49 119
           C58 92 54 72 38 53 Z"
        fill="url(#sailGrad)"
        stroke="#7a5a25"
        stroke-width="2.6"
        stroke-linejoin="round"/>

      <!-- sail folds -->
      <path d="M62 59 C71 84 69 104 56 118" fill="none" stroke="#b89455" stroke-width="1.4" opacity="0.5"/>
      <path d="M146 59 C140 83 143 105 152 120" fill="none" stroke="#b89455" stroke-width="1.4" opacity="0.5"/>

      <!-- smaller pirate emblem -->
      <g transform="translate(106,88) scale(0.52)">
        <!-- bones -->
        <g fill="#ffffff" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="-42" y1="-30" x2="40" y2="34"/>
          <circle cx="-45" cy="-33" r="8"/>
          <circle cx="-35" cy="-41" r="8"/>
          <circle cx="45" cy="37" r="8"/>
          <circle cx="35" cy="45" r="8"/>

          <line x1="42" y1="-30" x2="-40" y2="34"/>
          <circle cx="45" cy="-33" r="8"/>
          <circle cx="35" cy="-41" r="8"/>
          <circle cx="-45" cy="37" r="8"/>
          <circle cx="-35" cy="45" r="8"/>
        </g>

        <!-- skull -->
        <circle cx="0" cy="0" r="30" fill="#fff" stroke="#111" stroke-width="3"/>
        <path d="M-18 19 Q0 34 18 19 L16 42 Q0 50 -16 42 Z" fill="#fff" stroke="#111" stroke-width="3"/>

        <!-- eyes + nose -->
        <ellipse cx="-11" cy="3" rx="9" ry="11" fill="#050505"/>
        <ellipse cx="11" cy="3" rx="9" ry="11" fill="#050505"/>
        <ellipse cx="0" cy="17" rx="4" ry="5" fill="#050505"/>

        <!-- teeth -->
        <path d="M-15 27 H15" stroke="#111" stroke-width="2"/>
        <path d="M-14 36 H14" stroke="#111" stroke-width="2"/>
        <path d="M-7 24 V42" stroke="#111" stroke-width="1.6"/>
        <path d="M0 23 V45" stroke="#111" stroke-width="1.6"/>
        <path d="M7 24 V42" stroke="#111" stroke-width="1.6"/>

        <!-- hat -->
        <path d="M-42 -16 Q0 -25 42 -16 L40 -9 Q0 -1 -40 -9 Z"
              fill="#f9d923" stroke="#111" stroke-width="3"/>
        <path d="M-26 -17 Q-21 -47 0 -50 Q21 -47 26 -17 Z"
              fill="#f9d923" stroke="#111" stroke-width="3"/>
        <path d="M-29 -20 Q0 -26 29 -20 L29 -12 Q0 -5 -29 -12 Z"
              fill="#e63946" stroke="#111" stroke-width="2.2"/>
      </g>

      <!-- chibi pirate boy -->
      <g transform="translate(62,82)">
        <!-- legs -->
        <line x1="-7" y1="28" x2="-10" y2="40" stroke="#d9b08c" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="7" y1="28" x2="10" y2="40" stroke="#d9b08c" stroke-width="3.2" stroke-linecap="round"/>

        <!-- shorts -->
        <rect x="-10" y="20" width="20" height="10" rx="3" fill="#2f6fed"/>

        <!-- body -->
        <rect x="-12" y="3" width="24" height="19" rx="5" fill="#d62828" stroke="#7a1010" stroke-width="1.5"/>

        <!-- arms -->
        <line x1="-11" y1="10" x2="-21" y2="18" stroke="#d9b08c" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="11" y1="10" x2="21" y2="1" stroke="#d9b08c" stroke-width="3.2" stroke-linecap="round"/>

        <!-- head -->
        <circle cx="0" cy="-12" r="14" fill="#d9b08c" stroke="#8a5a3c" stroke-width="1.3"/>

        <!-- hair -->
        <path d="M-11 -14 Q-8 -25 0 -25 Q8 -25 11 -14 Q6 -17 2 -17 Q-2 -17 -11 -14 Z" fill="#1a1a1a"/>
        <path d="M-10 -14 Q-6 -10 -3 -13 Q0 -9 3 -13 Q7 -10 10 -14 L10 -4 Q0 -1 -10 -4 Z" fill="#1a1a1a"/>

        <!-- hat -->
        <ellipse cx="0" cy="-18" rx="20" ry="6" fill="#f6c65b" stroke="#8b4513" stroke-width="1.7"/>
        <path d="M-12 -24 Q0 -31 12 -24 Q11 -18 0 -18 Q-11 -18 -12 -24 Z"
              fill="#f6c65b" stroke="#8b4513" stroke-width="1.7"/>
        <path d="M-10 -21 Q0 -23 10 -21" fill="none" stroke="#d62828" stroke-width="2.3" stroke-linecap="round"/>

        <!-- face -->
        <circle cx="-4" cy="-12" r="1.4" fill="#111"/>
        <circle cx="4" cy="-12" r="1.4" fill="#111"/>
        <path d="M-4 -7 Q0 -4 4 -7" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>

        <!-- bounce -->
        <animateTransform
          attributeName="transform"
          type="translate"
          values="62,82; 62,80; 62,82; 62,84; 62,82"
          dur="2.2s"
          repeatCount="indefinite"/>
      </g>

      <!-- rear cabin -->
      <g>
        <path d="M25 101 H70 L66 118 H30 Z" fill="#8f4c1e" stroke="#f0c674" stroke-width="2.2"/>
        <path d="M30 107 H65" stroke="#2d1609" stroke-width="2" opacity="0.7"/>
        <rect x="35" y="104" width="7" height="10" rx="1" fill="#ffd166"/>
        <rect x="48" y="104" width="7" height="10" rx="1" fill="#ffd166"/>
      </g>

      <!-- hull -->
      <path
        d="M18 114
           C42 139 151 142 207 114
           C195 139 174 149 127 152
           C83 154 43 145 27 131
           Z"
        fill="url(#hullGrad)"
        stroke="#f0c674"
        stroke-width="3.2"
        stroke-linejoin="round"/>

      <!-- deck rail -->
      <path d="M21 111 H204" stroke="#f0c674" stroke-width="7" stroke-linecap="round"/>
      <path d="M23 111 H202" stroke="#3a1b09" stroke-width="2.4" stroke-linecap="round" opacity="0.75"/>

      <!-- hull details -->
      <path d="M43 126 C78 138 146 139 183 126" fill="none" stroke="#c77b35" stroke-width="2.1" opacity="0.85"/>
      <path d="M56 138 C90 146 139 146 171 138" fill="none" stroke="#3a1b09" stroke-width="2" opacity="0.45"/>

      <!-- portholes -->
      <circle cx="77" cy="130" r="8.5" fill="#0d1117" stroke="#f0c674" stroke-width="3.1"/>
      <circle cx="112" cy="133" r="8.5" fill="#0d1117" stroke="#f0c674" stroke-width="3.1"/>
      <circle cx="148" cy="130" r="8.5" fill="#0d1117" stroke="#f0c674" stroke-width="3.1"/>

      <!-- bow -->
      <path
        d="M207 114
           C225 102 231 88 223 81
           C214 75 204 84 206 95
           C207 103 217 102 217 93"
        fill="none"
        stroke="#f0c674"
        stroke-width="5"
        stroke-linecap="round"/>

      <!-- stern -->
      <path d="M18 114 C7 108 3 96 5 86" fill="none" stroke="#f0c674" stroke-width="4" stroke-linecap="round"/>

      <!-- water splashes -->
      <path d="M199 146 Q212 138 225 146" fill="none" stroke="#79c0ff" stroke-width="2.3" opacity="0.95"/>
      <path d="M38 146 Q26 138 12 146" fill="none" stroke="#79c0ff" stroke-width="2.3" opacity="0.95"/>
      <circle cx="226" cy="137" r="2.8" fill="#58a6ff" opacity="0.85"/>
      <circle cx="235" cy="147" r="2.2" fill="#58a6ff" opacity="0.65"/>
    </g>
  </g>

  <!-- Caption -->
  <text x="610" y="112" text-anchor="middle" font-family="monospace" font-size="15" fill="#c9d1d9">
    Sailing through the Contribution Sea...
  </text>

</svg>
