<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#0a1220"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <linearGradient id="seaLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>

    <linearGradient id="hullGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b5a27"/>
      <stop offset="100%" stop-color="#6b3710"/>
    </linearGradient>

    <linearGradient id="sailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d62839"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tinyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="140" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g opacity="0.42">
    <circle cx="90" cy="24" r="1.2" fill="#c9d1d9"/>
    <circle cx="145" cy="20" r="1" fill="#8b949e"/>
    <circle cx="220" cy="28" r="1.1" fill="#c9d1d9"/>
    <circle cx="330" cy="22" r="1" fill="#8b949e"/>
    <circle cx="468" cy="20" r="1.2" fill="#c9d1d9"/>
    <circle cx="590" cy="18" r="1" fill="#8b949e"/>
    <circle cx="700" cy="25" r="1.2" fill="#c9d1d9"/>
    <circle cx="790" cy="20" r="1" fill="#8b949e"/>
  </g>

  <!-- Frame -->
  <rect x="28" y="18" width="844" height="100" rx="10" fill="none" stroke="#7d8590" stroke-width="1.1" opacity="0.7"/>
  <rect x="28.5" y="18.5" width="843" height="99" rx="10" fill="none" stroke="#c9d1d9" stroke-width="0.4" opacity="0.12"/>

  <!-- Contribution blocks -->
  <g transform="translate(98,42)" filter="url(#tinyGlow)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#0e4429"/>
    <rect x="15" y="0" width="12" height="12" rx="2" fill="#006d32"/>
    <rect x="30" y="0" width="12" height="12" rx="2" fill="#26a641"/>
    <rect x="45" y="0" width="12" height="12" rx="2" fill="#39d353"/>

    <rect x="0" y="15" width="12" height="12" rx="2" fill="#161b22"/>
    <rect x="15" y="15" width="12" height="12" rx="2" fill="#0e4429"/>
    <rect x="30" y="15" width="12" height="12" rx="2" fill="#006d32"/>
    <rect x="45" y="15" width="12" height="12" rx="2" fill="#26a641"/>
  </g>

  <!-- Back wave -->
  <path d="M0 92 Q45 84 90 92 T180 92 T270 92 T360 92 T450 92 T540 92 T630 92 T720 92 T810 92 T900 92"
        fill="none" stroke="#1f6feb" stroke-width="1.5" opacity="0.35">
    <animate attributeName="d"
      dur="6s"
      repeatCount="indefinite"
      values="
      M0 92 Q45 84 90 92 T180 92 T270 92 T360 92 T450 92 T540 92 T630 92 T720 92 T810 92 T900 92;
      M0 92 Q45 100 90 92 T180 92 T270 92 T360 92 T450 92 T540 92 T630 92 T720 92 T810 92 T900 92;
      M0 92 Q45 84 90 92 T180 92 T270 92 T360 92 T450 92 T540 92 T630 92 T720 92 T810 92 T900 92"/>
  </path>

  <!-- Main wave -->
  <path d="M0 95 Q45 104 90 95 T180 95 T270 95 T360 95 T450 95 T540 95 T630 95 T720 95 T810 95 T900 95"
        fill="none" stroke="url(#seaLine)" stroke-width="2.8" stroke-linecap="round" filter="url(#softGlow)">
    <animate attributeName="d"
      dur="4.8s"
      repeatCount="indefinite"
      values="
      M0 95 Q45 104 90 95 T180 95 T270 95 T360 95 T450 95 T540 95 T630 95 T720 95 T810 95 T900 95;
      M0 95 Q45 86 90 95 T180 95 T270 95 T360 95 T450 95 T540 95 T630 95 T720 95 T810 95 T900 95;
      M0 95 Q45 104 90 95 T180 95 T270 95 T360 95 T450 95 T540 95 T630 95 T720 95 T810 95 T900 95"/>
  </path>

  <!-- Animated ship -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="-210 0"
      to="940 0"
      dur="12s"
      repeatCount="indefinite"/>

    <g transform="translate(0,20)">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -2.8; 0 0; 0 2.2; 0 0"
        dur="2.8s"
        repeatCount="indefinite"
        additive="sum"/>

      <!-- Shadow -->
      <ellipse cx="116" cy="78" rx="60" ry="8" fill="#000" opacity="0.14"/>

      <!-- Mast -->
      <rect x="122" y="24" width="6" height="50" rx="2" fill="#e7b75f"/>
      <circle cx="125" cy="22" r="3.4" fill="#f0c674"/>

      <!-- Flag -->
      <path d="M128 18 L163 27 L128 36 Z" fill="#e63946" stroke="#f6d365" stroke-width="1.8">
        <animate attributeName="d"
          dur="1.7s"
          repeatCount="indefinite"
          values="
          M128 18 L163 27 L128 36 Z;
          M128 18 L167 26 L128 36 Z;
          M128 18 L163 27 L128 36 Z"/>
      </path>

      <!-- Sail -->
      <path d="M130 31 C151 35 171 44 189 55 C169 66 149 71 130 75 Z"
            fill="url(#sailGrad)" stroke="#f6d365" stroke-width="2.2"/>
      <path d="M136 37 C149 41 163 47 175 54 C161 60 149 64 136 68 Z"
            fill="#ffe9a8" opacity="0.95"/>

      <!-- Hull -->
      <path d="M52 72 C77 89 144 90 176 72 L158 98 L74 98 Z"
            fill="url(#hullGrad)" stroke="#f0c674" stroke-width="3" stroke-linejoin="round"/>

      <!-- Hull highlight -->
      <path d="M70 79 C95 87 136 87 160 79"
            fill="none" stroke="#f6d365" stroke-width="2.6" stroke-linecap="round" opacity="0.95"/>

      <!-- Deck line -->
      <path d="M61 72 H168" stroke="#2d1609" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

      <!-- Bow / stern -->
      <path d="M176 72 C188 70 197 66 203 60 C200 71 190 80 176 84"
            fill="none" stroke="#f0c674" stroke-width="3" stroke-linecap="round"/>
      <path d="M52 72 C43 70 36 66 31 60 C35 72 45 80 57 84"
            fill="none" stroke="#f0c674" stroke-width="3" stroke-linecap="round"/>

      <!-- Chibi pirate boy (inspired vibe) -->
      <g transform="translate(104,34)">
        <!-- legs -->
        <line x1="-6" y1="27" x2="-10" y2="39" stroke="#d8b28a" stroke-width="3" stroke-linecap="round"/>
        <line x1="6" y1="27" x2="10" y2="39" stroke="#d8b28a" stroke-width="3" stroke-linecap="round"/>

        <!-- shorts -->
        <rect x="-9" y="20" width="18" height="10" rx="3" fill="#2f6fed"/>

        <!-- body -->
        <rect x="-11" y="4" width="22" height="18" rx="5" fill="#d62828" stroke="#7a1010" stroke-width="1.5"/>
        <path d="M0 5 L0 22" stroke="#f6c9a5" stroke-width="1.4" opacity="0.75"/>
        <circle cx="0" cy="13" r="1.3" fill="#f6c9a5"/>

        <!-- arms -->
        <line x1="-10" y1="10" x2="-19" y2="19" stroke="#d8b28a" stroke-width="3" stroke-linecap="round"/>
        <line x1="10" y1="10" x2="20" y2="2" stroke="#d8b28a" stroke-width="3" stroke-linecap="round"/>

        <!-- hand -->
        <circle cx="20" cy="2" r="2.6" fill="#d8b28a"/>

        <!-- neck -->
        <rect x="-3" y="0" width="6" height="5" rx="2" fill="#d8b28a"/>

        <!-- head -->
        <circle cx="0" cy="-11" r="13" fill="#d8b28a" stroke="#8a5a3c" stroke-width="1.2"/>

        <!-- hair -->
        <path d="M-11 -13 Q-8 -24 0 -24 Q8 -24 11 -13 Q6 -16 2 -16 Q-2 -16 -11 -13 Z"
              fill="#1a1a1a"/>
        <path d="M-10 -13 Q-6 -9 -3 -12 Q0 -8 3 -12 Q7 -9 10 -13 L10 -4 Q0 -1 -10 -4 Z"
              fill="#1a1a1a"/>

        <!-- hat brim -->
        <ellipse cx="0" cy="-18" rx="19" ry="5.5" fill="#f6c65b" stroke="#8b4513" stroke-width="1.6"/>
        <!-- hat top -->
        <path d="M-11 -24 Q0 -31 11 -24 Q10 -18 0 -18 Q-10 -18 -11 -24 Z"
              fill="#f6c65b" stroke="#8b4513" stroke-width="1.6"/>
        <!-- red band -->
        <path d="M-9 -21 Q0 -23 9 -21" fill="none" stroke="#d62828" stroke-width="2.2" stroke-linecap="round"/>

        <!-- face -->
        <circle cx="-4" cy="-12" r="1.4" fill="#111"/>
        <circle cx="4" cy="-12" r="1.4" fill="#111"/>
        <path d="M-4 -7 Q0 -4 4 -7" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>

        <!-- vest opening -->
        <path d="M-3 7 Q0 11 3 7" fill="none" stroke="#7a1010" stroke-width="1"/>

        <!-- subtle bounce -->
        <animateTransform
          attributeName="transform"
          type="translate"
          values="104,34; 104,32.8; 104,34; 104,35.2; 104,34"
          dur="2.2s"
          repeatCount="indefinite"/>
      </g>

      <!-- Splash -->
      <path d="M184 87 Q189 83 194 87" fill="none" stroke="#79c0ff" stroke-width="1.5" opacity="0.8"/>
      <path d="M47 87 Q42 83 37 87" fill="none" stroke="#79c0ff" stroke-width="1.5" opacity="0.8"/>
    </g>
  </g>

  <!-- Caption -->
  <text x="450" y="108" text-anchor="middle" font-family="monospace" font-size="14" fill="#c9d1d9">
    Sailing through the Contribution Sea...
  </text>

  <text x="450" y="124" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#8b949e">
    One commit closer to the Grand Line
  </text>
</svg>
